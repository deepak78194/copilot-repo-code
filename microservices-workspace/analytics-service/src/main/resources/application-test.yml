micronaut:
  server:
    port: -1

datasources:
  default:
    url: jdbc:h2:mem:analytics_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ''
    driver-class-name: org.h2.Driver
    schema-generate: CREATE_DROP
    dialect: H2
  oracle:
    url: jdbc:h2:mem:analytics_oracle_test;DB_CLOSE_DELAY=-1
    username: sa
    password: ''
    driver-class-name: org.h2.Driver
    schema-generate: CREATE_DROP
    dialect: H2

logger:
  levels:
    com.example.analytics: DEBUG
